services:
    app:
        build:
            context: ../
            dockerfile: .local/Dockerfile
        image: leaflly-php-app
        container_name: leaflly-app
        restart: unless-stopped
        working_dir: /var/www
        volumes:
            - ../:/var/www
        networks:
            - leaflly-network

    web:
        image: nginx:alpine
        container_name: leaflly-web
        restart: unless-stopped
        ports:
            - "8080:80"
        volumes:
            - ../:/var/www
            - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
        networks:
            - leaflly-network
        depends_on:
            -   app

    db:
        image: mysql:8.0
        container_name: leaflly-db
        restart: unless-stopped
        environment:
            MYSQL_DATABASE: leaflly_db
            MYSQL_ROOT_PASSWORD: root
            MYSQL_PASSWORD: secret
            MYSQL_USER: user
        ports:
            -   "33061:3306"
        volumes:
            -   dbdata:/var/lib/mysql
        networks:
            - leaflly-network

    phpmyadmin:
        image: phpmyadmin/phpmyadmin
        container_name: leaflly-phpmyadmin
        restart: unless-stopped
        environment:
            PMA_HOST: db
            PMA_PORT: 3306
            PMA_USER: user
            PMA_PASSWORD: secret
        ports:
            -   "5000:80"
        networks:
            - leaflly-network
        depends_on:
            - db

    redis:
        image: redis:alpine
        container_name: leaflly-redis
        restart: unless-stopped
        ports:
            - "6380:6379"
        networks:
            - leaflly-network


networks:
    leaflly-network:
        driver: bridge

volumes:
    dbdata:
